rules:
  - id: hardcoded-secret
    patterns:
      - pattern-either:
          - pattern-regex: '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'
          - pattern-regex: '(?i)(api[_-]?key|secret|password|token)\s*[:=]\s*["''][A-Za-z0-9+/]{16,}["'']'
    paths:
      exclude:
        - "*.md"
        - "test/**"
    message: Possible hardcoded secret/key in source - move to env/secret manager (CWE-798)
    severity: ERROR
    languages: [generic]